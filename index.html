<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Marble Race 3D</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { overflow: hidden; height: 100%; background: #0a0f18; font-family: "Segoe UI", system-ui, sans-serif; }
    #hud {
      position: fixed; top: 0; right: 0; width: 220px; padding: 14px 16px;
      background: linear-gradient(180deg, rgba(15,23,42,0.92), rgba(15,23,42,0.75));
      border-left: 2px solid rgba(148,163,184,0.35); color: #e2e8f0; z-index: 10;
      min-height: 100vh; pointer-events: none;
    }
    #hud h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: #94a3b8; margin-bottom: 8px; }
    #timer { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; margin-bottom: 14px; color: #f8fafc; }
    .row { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 13px; border-bottom: 1px solid rgba(51,65,85,0.5); }
    .row.done { opacity: 0.7; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 6px currentColor; }
    .rank { width: 22px; font-weight: 700; color: #facc15; }
    .cam-hint { margin-top: auto; padding-top: 20px; font-size: 11px; color: #64748b; line-height: 1.5; }
    #countdown {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      font-size: 120px; font-weight: 800; color: #fff; text-shadow: 0 8px 40px rgba(0,0,0,.6);
      z-index: 20; pointer-events: none; transition: opacity 0.2s;
    }
    #countdown.hidden { opacity: 0; }
    #overlay {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      background: rgba(10,15,24,0.85); z-index: 30;
    }
    #overlay.open { display: flex; }
    #overlay .panel {
      background: linear-gradient(145deg, #1e293b, #0f172a); border: 2px solid #475569;
      border-radius: 16px; padding: 28px 36px; max-width: 420px; text-align: center;
      box-shadow: 0 25px 80px rgba(0,0,0,.5);
    }
    #overlay h1 { color: #facc15; font-size: 28px; margin-bottom: 8px; }
    #overlay p { color: #94a3b8; margin-bottom: 20px; }
    #final-list { text-align: left; color: #e2e8f0; font-size: 15px; line-height: 1.9; }
  </style>
</head>
<body>
  <div id="countdown">3</div>
  <div id="hud">
    <h2>Time</h2>
    <div id="timer">0:00.0</div>
    <h2>Leaderboard</h2>
    <div id="board"></div>
    <div class="cam-hint">Press <strong>C</strong> to toggle camera: overview ↔ follow leader</div>
  </div>
  <div id="overlay">
    <div class="panel">
      <h1>Race Complete</h1>
      <p>Final standings</p>
      <div id="final-list"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
  <script>
  (function () {
    'use strict';

    /* ========== Config ========== */
    const MARBLE_RADIUS = 0.3;
    const MARBLE_MASS = 0.9;
    const CHANNEL_HALF_W = 1.0; /* total groove width ~2 */
    const FLOOR_THICK = 0.35;
    const WALL_THICK = 0.22;
    const WALL_H = 1.05;
    const WALL_INWARD_TILT = 0.42; /* rad — walls lean in like a gutter */
    const SEG_OVERLAP = 0.12; /* no gaps between Cannon boxes */
    const ENCLOSED_DIST = 12; /* world units along path: roof + closed channel */
    const MARBLE_FRICTION = 0.08;
    const MARBLE_RESTITUTION = 0.42;
    /** Floor / wall contact params (per spec). */
    const FLOOR_FRICTION = 0.4;
    const FLOOR_RESTITUTION = 0.3;
    const WALL_FRICTION = 0.1;
    const WALL_RESTITUTION = 0.6;
    const GRAVITY_Y = -30;
    const MIN_SPEED_NUDGE = 2;
    const NUDGE_FORCE = 22;
    const START_PUSH_SPEED = 8.5; /* strong forward kick along 3D tangent */
    /** Log marble body positions every frame when ?debug=1 is in the URL (very verbose). */
    const DEBUG_MARBLE_POS = /[?&]debug=1\b/.test(location.search);
    const MARBLE_COLORS = [
      { name: 'Red',    hex: 0xe74c3c },
      { name: 'Blue',   hex: 0x3498db },
      { name: 'Green',  hex: 0x2ecc71 },
      { name: 'Yellow', hex: 0xf1c40f },
      { name: 'Orange', hex: 0xe67e22 },
      { name: 'Purple', hex: 0x9b59b6 },
      { name: 'Pink',   hex: 0xff69b4 },
      { name: 'Cyan',   hex: 0x1abc9c },
    ];

    /**
     * Rebuilt course: steep “mountain” drop → banked left → steep chute → banked right → zigzag → finish straight.
     * Large ΔY, sustained ~22–35° effective grades, short 45°+ kinks in steep zones.
     */
    function buildPathSamples() {
      const samples = [];
      const STEPS = 170;
      for (let i = 0; i <= STEPS; i++) {
        const u = i / STEPS;
        const z = u * 248 - 8;
        let x = 0;
        let y = 128;

        if (u < 0.09) {
          const k = u / 0.09;
          y = 128 - k * 44;
          x = 0;
        } else if (u < 0.24) {
          const k = (u - 0.09) / 0.15;
          y = 84 - k * 26;
          x = -Math.sin(k * Math.PI * 0.85) * 18;
        } else if (u < 0.3) {
          const k = (u - 0.24) / 0.06;
          y = 58 - k * 24;
          x = -18 + k * 5;
        } else if (u < 0.44) {
          const k = (u - 0.3) / 0.14;
          y = 34 - k * 11;
          x = -13 + Math.sin(k * Math.PI * 0.95) * 20;
        } else if (u < 0.64) {
          const k = (u - 0.44) / 0.2;
          y = 23 - k * 8;
          x = Math.sin(k * Math.PI * 5) * 5.5;
        } else {
          const k = (u - 0.64) / 0.36;
          y = 15 - k * 10;
          x = (1 - k) * Math.sin(0.64 * Math.PI * 5) * 5.5 * 0.25;
        }

        samples.push({ x, y, z, u });
      }
      /* Arc length + banking from horizontal curvature (centrifugal into track). */
      let s = 0;
      samples[0].s = 0;
      for (let i = 1; i < samples.length; i++) {
        const a = samples[i - 1];
        const b = samples[i];
        const dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
        s += Math.sqrt(dx * dx + dy * dy + dz * dz);
        samples[i].s = s;
      }
      const headings = [];
      for (let i = 0; i < samples.length; i++) {
        const i0 = Math.max(0, i - 1);
        const i1 = Math.min(samples.length - 1, i + 1);
        const p0 = samples[i0], p1 = samples[i1];
        headings.push(Math.atan2(p1.x - p0.x, p1.z - p0.z));
      }
      for (let i = 0; i < samples.length; i++) {
        const h0 = headings[Math.max(0, i - 1)];
        const h1 = headings[Math.min(headings.length - 1, i + 1)];
        let dh = h1 - h0;
        while (dh > Math.PI) dh -= Math.PI * 2;
        while (dh < -Math.PI) dh += Math.PI * 2;
        samples[i].bank = Math.max(-0.62, Math.min(0.62, dh * 1.35));
      }
      return samples;
    }

    const pathSamples = buildPathSamples();

    /** Unit tangent at sample index (smooth). */
    function getTangentAtSample(i) {
      const i0 = Math.max(0, Math.min(pathSamples.length - 2, i));
      const a = pathSamples[i0];
      const b = pathSamples[Math.min(pathSamples.length - 1, i0 + 1)];
      const dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
      const len = Math.sqrt(dx * dx + dy * dy + dz * dz) || 1;
      return new THREE.Vector3(dx / len, dy / len, dz / len);
    }

    /**
     * Right-handed track frame: forward = 3D tangent, up ≈ sky from groove floor, right = lateral.
     * Bank rotates (right, up) around forward so turns push marbles into the surface.
     */
    function getTrackSegmentFrame(i) {
      const p0 = pathSamples[i];
      const p1 = pathSamples[i + 1];
      const forward = new THREE.Vector3(p1.x - p0.x, p1.y - p0.y, p1.z - p0.z);
      forward.normalize();
      if (forward.lengthSq() < 1e-8) forward.set(0, -1, 0);

      const worldUp = new THREE.Vector3(0, 1, 0);
      let right = new THREE.Vector3().crossVectors(worldUp, forward).normalize();
      if (right.lengthSq() < 1e-8) right.set(1, 0, 0);
      let up = new THREE.Vector3().crossVectors(forward, right).normalize();

      const bank = (p0.bank + p1.bank) * 0.5;
      const cosb = Math.cos(bank), sinb = Math.sin(bank);
      const rightB = new THREE.Vector3(
        right.x * cosb - up.x * sinb,
        right.y * cosb - up.y * sinb,
        right.z * cosb - up.z * sinb
      ).normalize();
      const upB = new THREE.Vector3().crossVectors(forward, rightB).normalize();

      return { p0, p1, forward, upB, rightB };
    }

    function nearestPathTangent(pos) {
      let best = 0;
      let bestD = Infinity;
      const px = pos.x, py = pos.y, pz = pos.z;
      for (let i = 0; i < pathSamples.length; i++) {
        const p = pathSamples[i];
        const d = (px - p.x) ** 2 + (py - p.y) ** 2 + (pz - p.z) ** 2;
        if (d < bestD) {
          bestD = d;
          best = i;
        }
      }
      return getTangentAtSample(Math.min(pathSamples.length - 2, best));
    }

    /* ========== Three.js setup ========== */
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x6b9bd1);
    scene.fog = new THREE.Fog(0x87ceeb, 120, 320);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0xb8d4ff, 0x3d2914, 0.55);
    scene.add(hemi);
    const sun = new THREE.DirectionalLight(0xfff5e6, 0.95);
    sun.position.set(40, 80, 30);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 280;
    sun.shadow.camera.left = -80;
    sun.shadow.camera.right = 80;
    sun.shadow.camera.top = 80;
    sun.shadow.camera.bottom = -80;
    scene.add(sun);

    /* Wooden-ish track material */
    const woodTex = makeWoodTexture();
    const trackMat = new THREE.MeshStandardMaterial({
      map: woodTex,
      roughness: 0.75,
      metalness: 0.05,
      color: 0xd4a574,
    });
    const railMat = new THREE.MeshStandardMaterial({ color: 0x5c4033, roughness: 0.9 });

    function makeWoodTexture() {
      const c = document.createElement('canvas');
      c.width = 256; c.height = 256;
      const g = c.getContext('2d');
      g.fillStyle = '#c9a06c';
      g.fillRect(0, 0, 256, 256);
      for (let i = 0; i < 80; i++) {
        g.strokeStyle = `rgba(100,60,30,${0.05 + Math.random() * 0.08})`;
        g.beginPath();
        g.moveTo(Math.random() * 256, 0);
        g.lineTo(Math.random() * 256 + 20, 256);
        g.stroke();
      }
      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      return tex;
    }

    /* ========== Cannon world ========== */
    const world = new CANNON.World();
    world.gravity.set(0, GRAVITY_Y, 0);
    world.broadphase = new CANNON.NaiveBroadphase();
    world.solver.iterations = 18;
    world.defaultContactMaterial.contactEquationStiffness = 1e7;
    world.defaultContactMaterial.contactEquationRelaxation = 3;

    const physMatFloor = new CANNON.Material('trackFloor');
    const physMatWall = new CANNON.Material('trackWall');
    const physMatMarble = new CANNON.Material('marble');
    const physMatBumper = new CANNON.Material('bumper');
    const physMatGroundPlane = new CANNON.Material('groundPlane');
    world.addContactMaterial(new CANNON.ContactMaterial(physMatFloor, physMatMarble, {
      friction: FLOOR_FRICTION, restitution: FLOOR_RESTITUTION,
    }));
    world.addContactMaterial(new CANNON.ContactMaterial(physMatWall, physMatMarble, {
      friction: WALL_FRICTION, restitution: WALL_RESTITUTION,
    }));
    world.addContactMaterial(new CANNON.ContactMaterial(physMatMarble, physMatMarble, {
      friction: MARBLE_FRICTION, restitution: MARBLE_RESTITUTION,
    }));
    world.addContactMaterial(new CANNON.ContactMaterial(physMatBumper, physMatMarble, {
      friction: 0.05, restitution: 0.92,
    }));
    world.addContactMaterial(new CANNON.ContactMaterial(physMatGroundPlane, physMatMarble, {
      friction: 0.5, restitution: 0.15,
    }));

    const staticBodies = [];
    const dynamicObstacles = []; // { body, mesh?, update(dt) }

    function addStaticBox(pos, halfExtents, quat, material) {
      const shape = new CANNON.Box(new CANNON.Vec3(halfExtents.x, halfExtents.y, halfExtents.z));
      const body = new CANNON.Body({ mass: 0, material: material ?? physMatFloor });
      body.position.copy(pos);
      if (quat) body.quaternion.copy(quat);
      body.addShape(shape);
      world.addBody(body);
      staticBodies.push(body);
      return body;
    }

    /** Maps Three quaternion to Cannon. */
    function toCannonQuat(qT) {
      return new CANNON.Quaternion(qT.x, qT.y, qT.z, qT.w);
    }

    /* Build track segments between samples */
    const marbles = [];

    /** Single-file line along -forward from path start, lifted into the groove. */
    function setMarbleSpawnTransform(body, slotIndex) {
      const { forward, upB } = getTrackSegmentFrame(0);
      const p0 = pathSamples[0];
      const spacing = 1.0;
      const base = new THREE.Vector3(p0.x, p0.y, p0.z).sub(forward.clone().multiplyScalar(slotIndex * spacing));
      const lift = MARBLE_RADIUS + FLOOR_THICK * 0.5 + 0.14;
      body.position.set(
        base.x + upB.x * lift,
        base.y + upB.y * lift,
        base.z + upB.z * lift
      );
      body.velocity.set(0, 0, 0);
      body.angularVelocity.set(0, 0, 0);
      body.quaternion.set(0, 0, 0, 1);
    }

    /** Identical forward push + small lateral jitter (±0.05). */
    function kickMarblesOnRaceStart() {
      const { forward, rightB } = getTrackSegmentFrame(0);
      marbles.forEach((m) => {
        m.body.wakeUp();
        const lat = (Math.random() - 0.5) * 0.1;
        m.body.velocity.set(
          forward.x * START_PUSH_SPEED + rightB.x * lat,
          forward.y * START_PUSH_SPEED + rightB.y * lat,
          forward.z * START_PUSH_SPEED + rightB.z * lat
        );
        m.body.angularVelocity.set(0, 0, 0);
      });
    }

    let finishZ = 0;
    let finishX = 0;
    let finishY = 0;
    const finishTanWorld = new THREE.Vector3();

    /* U-channel: floor + inward-tilted walls (+ optional roof for enclosed start). */
    for (let i = 0; i < pathSamples.length - 1; i++) {
      const p0 = pathSamples[i];
      const p1 = pathSamples[i + 1];
      const { forward, upB, rightB } = getTrackSegmentFrame(i);
      const mid = new THREE.Vector3((p0.x + p1.x) * 0.5, (p0.y + p1.y) * 0.5, (p0.z + p1.z) * 0.5);
      const segLen =
        Math.sqrt(
          (p1.x - p0.x) ** 2 + (p1.y - p0.y) ** 2 + (p1.z - p0.z) ** 2
        ) + SEG_OVERLAP;

      const qThree = new THREE.Quaternion();
      const m3 = new THREE.Matrix4();
      m3.makeBasis(rightB, upB, forward);
      qThree.setFromRotationMatrix(m3);
      const qCan = toCannonQuat(qThree);

      const floorCenter = mid.clone().sub(upB.clone().multiplyScalar(FLOOR_THICK * 0.5));
      const floorHalf = new CANNON.Vec3(
        CHANNEL_HALF_W * 0.98,
        FLOOR_THICK * 0.5,
        segLen * 0.5
      );
      addStaticBox(
        new CANNON.Vec3(floorCenter.x, floorCenter.y, floorCenter.z),
        floorHalf,
        qCan,
        physMatFloor
      );

      const floorMesh = new THREE.Mesh(
        new THREE.BoxGeometry(CHANNEL_HALF_W * 1.96, FLOOR_THICK, segLen),
        trackMat
      );
      floorMesh.castShadow = true;
      floorMesh.receiveShadow = true;
      floorMesh.position.copy(floorCenter);
      floorMesh.quaternion.copy(qThree);
      if (trackMat.map) {
        trackMat.map.repeat.set(CHANNEL_HALF_W * 0.4, segLen * 0.1);
      }
      scene.add(floorMesh);

      const wallHalf = new CANNON.Vec3(WALL_THICK * 0.5, WALL_H * 0.5, segLen * 0.5);
      const lateral = CHANNEL_HALF_W + WALL_THICK * 0.55;
      const wallLift = FLOOR_THICK * 0.5 + WALL_H * 0.42;

      for (const sign of [-1, 1]) {
        const qTilt = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), sign * WALL_INWARD_TILT);
        const qWall = qThree.clone().multiply(qTilt);
        const wpos = mid.clone()
          .add(rightB.clone().multiplyScalar(sign * lateral))
          .add(upB.clone().multiplyScalar(wallLift));
        addStaticBox(new CANNON.Vec3(wpos.x, wpos.y, wpos.z), wallHalf, toCannonQuat(qWall), physMatWall);
        const wm = new THREE.Mesh(
          new THREE.BoxGeometry(WALL_THICK, WALL_H, segLen),
          railMat
        );
        wm.position.copy(wpos);
        wm.quaternion.copy(qWall);
        wm.castShadow = true;
        wm.receiveShadow = true;
        scene.add(wm);
      }

      const midS = (p0.s + p1.s) * 0.5;
      if (midS < ENCLOSED_DIST) {
        const roofT = 0.22;
        const roofHalf = new CANNON.Vec3(CHANNEL_HALF_W * 1.05, roofT * 0.5, segLen * 0.5);
        const roofC = mid.clone().add(upB.clone().multiplyScalar(FLOOR_THICK + WALL_H + roofT * 0.5 + 0.12));
        addStaticBox(new CANNON.Vec3(roofC.x, roofC.y, roofC.z), roofHalf, qCan, physMatWall);
        const roofMesh = new THREE.Mesh(
          new THREE.BoxGeometry(roofHalf.x * 2, roofT, segLen),
          new THREE.MeshStandardMaterial({ color: 0x3d2e22, roughness: 0.9 })
        );
        roofMesh.position.copy(roofC);
        roofMesh.quaternion.copy(qThree);
        scene.add(roofMesh);
      }
    }

    const last = pathSamples[pathSamples.length - 1];
    finishTanWorld.copy(getTangentAtSample(pathSamples.length - 2)).normalize();
    finishX = last.x + finishTanWorld.x * 4;
    finishY = last.y + finishTanWorld.y * 4;
    finishZ = last.z + finishTanWorld.z * 4;

    const stripeMatW = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const stripeMatB = new THREE.MeshStandardMaterial({ color: 0x111111 });

    /* Finish plane: progress along `finishTanWorld` from `last` sample. */

    /* Extra obstacles omitted — narrow U-channel + roof needs a clear corridor. */

    /* Ground plane far below */
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(400, 400),
      new THREE.MeshStandardMaterial({ color: 0x355c3d, roughness: 1 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -15;
    ground.receiveShadow = true;
    scene.add(ground);
    const gBody = new CANNON.Body({ mass: 0, material: physMatGroundPlane });
    gBody.addShape(new CANNON.Plane());
    gBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
    gBody.position.set(0, -15, 0);
    world.addBody(gBody);

    /* ========== Marbles ========== */
    const start = pathSamples[0];

    for (let i = 0; i < 8; i++) {
      const col = MARBLE_COLORS[i];
      const shape = new CANNON.Sphere(MARBLE_RADIUS);
      const body = new CANNON.Body({
        mass: MARBLE_MASS,
        material: physMatMarble,
        linearDamping: 0.01,
        angularDamping: 0.01,
        allowSleep: false,
      });
      body.addShape(shape);
      setMarbleSpawnTransform(body, i);
      world.addBody(body);

      const mat = new THREE.MeshStandardMaterial({
        color: col.hex,
        emissive: col.hex,
        emissiveIntensity: 0.35,
        metalness: 0.2,
        roughness: 0.35,
      });
      const mesh = new THREE.Mesh(new THREE.SphereGeometry(MARBLE_RADIUS, 24, 24), mat);
      mesh.castShadow = true;
      mesh.position.set(body.position.x, body.position.y, body.position.z);
      mesh.quaternion.set(body.quaternion.x, body.quaternion.y, body.quaternion.z, body.quaternion.w);
      scene.add(mesh);

      marbles.push({
        body,
        mesh,
        name: col.name,
        colorHex: '#' + ((col.hex >>> 0) & 0xffffff).toString(16).padStart(6, '0'),
        finished: false,
        finishTime: null,
        place: null,
      });
    }

    /* Finish line: striped deck + poles + banner */
    const fg = new THREE.Group();
    for (let b = -5; b <= 5; b++) {
      const st = new THREE.Mesh(
        new THREE.BoxGeometry(0.55, 0.12, 7.5),
        Math.abs(b) % 2 === 0 ? stripeMatW : stripeMatB
      );
      st.position.set(finishX + b * 0.55, finishY + 0.05, finishZ);
      fg.add(st);
    }
    const pole1 = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 8), new THREE.MeshStandardMaterial({ color: 0x64748b }));
    pole1.position.set(finishX - 4, finishY + 4, finishZ);
    const pole2 = pole1.clone();
    pole2.position.set(finishX + 4, finishY + 4, finishZ);
    const banner = new THREE.Mesh(
      new THREE.PlaneGeometry(8, 1.2),
      new THREE.MeshStandardMaterial({ color: 0xdc2626, emissive: 0x450a0a, emissiveIntensity: 0.2, side: THREE.DoubleSide })
    );
    banner.position.set(finishX, finishY + 7.5, finishZ);
    banner.rotation.y = Math.PI / 2;
    fg.add(pole1, pole2, banner);
    scene.add(fg);

    /* ========== Race logic / HUD ========== */
    let raceStarted = false;
    let raceTime = 0;
    let allFinished = false;
    let camMode = 0; // 0 = overview, 1 = follow leader
    const boardEl = document.getElementById('board');
    const timerEl = document.getElementById('timer');
    const cdEl = document.getElementById('countdown');
    const overlayEl = document.getElementById('overlay');
    const finalListEl = document.getElementById('final-list');

    function progressAlongTrack(pos) {
      let best = 0, bestD = Infinity;
      const px = pos.x, py = pos.y, pz = pos.z;
      for (let i = 0; i < pathSamples.length; i++) {
        const p = pathSamples[i];
        const d = (px - p.x) ** 2 + (py - p.y) ** 2 + (pz - p.z) ** 2;
        if (d < bestD) { bestD = d; best = i; }
      }
      return pathSamples[best].s;
    }

    function sortMarblesByProgress() {
      return [...marbles].sort((a, b) => {
        if (a.finished && b.finished) return (a.place || 99) - (b.place || 99);
        if (a.finished) return -1;
        if (b.finished) return 1;
        return progressAlongTrack(b.body.position) - progressAlongTrack(a.body.position);
      });
    }

    let placeCounter = 0;
    function updateLeaderboard() {
      const sorted = sortMarblesByProgress();
      boardEl.innerHTML = '';
      sorted.forEach((m, idx) => {
        const row = document.createElement('div');
        row.className = 'row' + (m.finished ? ' done' : '');
        const rank = document.createElement('span');
        rank.className = 'rank';
        rank.textContent = m.place != null ? m.place + '.' : (idx + 1) + '.';
        const dot = document.createElement('span');
        dot.className = 'dot';
        dot.style.background = m.colorHex;
        dot.style.color = m.colorHex;
        const lab = document.createElement('span');
        lab.textContent = m.name + (m.finished ? `  ${formatTime(m.finishTime)}` : '');
        row.append(rank, dot, lab);
        boardEl.appendChild(row);
      });
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = sec - m * 60;
      return m + ':' + (s < 10 ? '0' : '') + s.toFixed(2);
    }

    function updateTimerDisplay() {
      timerEl.textContent = formatTime(raceTime);
    }

    /* Countdown: 3 → 2 → 1 → GO (page shows 3 immediately; race + physics start after GO) */
    let cdStep = 0;
    const cdInt = setInterval(() => {
      cdStep++;
      if (cdStep === 1) cdEl.textContent = '2';
      else if (cdStep === 2) cdEl.textContent = '1';
      else if (cdStep === 3) cdEl.textContent = 'GO!';
      else {
        clearInterval(cdInt);
        setTimeout(() => {
          cdEl.classList.add('hidden');
          raceStarted = true;
        }, 400);
      }
    }, 1000);

    let lastT = performance.now();
    let racePhysicsPrimed = false;
    function animate(now) {
      requestAnimationFrame(animate);
      const dt = Math.min(0.05, (now - lastT) / 1000);
      lastT = now;

      if (raceStarted && !allFinished) {
        raceTime += dt;
        updateTimerDisplay();
      }

      dynamicObstacles.forEach((o) => { if (o.update) o.update(dt); });

      if (raceStarted) {
        if (!racePhysicsPrimed) {
          racePhysicsPrimed = true;
          marbles.forEach((m, i) => {
            setMarbleSpawnTransform(m.body, i);
            m.body.wakeUp();
          });
          kickMarblesOnRaceStart();
        }
        world.step(1 / 60, dt, 4);

        marbles.forEach((m) => {
          const v = m.body.velocity;
          const sp = Math.sqrt(v.x * v.x + v.y * v.y + v.z * v.z);
          if (sp < MIN_SPEED_NUDGE) {
            const t = nearestPathTangent(m.body.position);
            const f = NUDGE_FORCE * m.body.mass;
            m.body.applyForce(new CANNON.Vec3(t.x * f, t.y * f, t.z * f), m.body.position);
          }
        });
      }

      marbles.forEach((m) => {
        const bp = m.body.position;
        m.mesh.position.set(bp.x, bp.y, bp.z);
        const bq = m.body.quaternion;
        m.mesh.quaternion.set(bq.x, bq.y, bq.z, bq.w);
      });

      if (DEBUG_MARBLE_POS && raceStarted) {
        const parts = marbles.map((m, j) => {
          const p = m.body.position;
          return `${j}:${p.x.toFixed(2)},${p.y.toFixed(2)},${p.z.toFixed(2)}`;
        });
        console.log('[marble bodies]', parts.join(' | '));
      }

      if (raceStarted) {
        marbles.forEach((m) => {
          if (m.finished) return;
          const p = m.body.position;
          const dx = p.x - last.x, dy = p.y - last.y, dz = p.z - last.z;
          const along =
            dx * finishTanWorld.x + dy * finishTanWorld.y + dz * finishTanWorld.z;
          const perp2 =
            dx * dx + dy * dy + dz * dz - along * along;
          if (along > 1.5 && perp2 < 64) {
            m.finished = true;
            m.finishTime = raceTime;
            m.place = ++placeCounter;
            if (placeCounter >= 8) {
              allFinished = true;
              showRaceComplete();
            }
          }
        });
      }

      updateLeaderboard();

      // Camera
      const sorted = sortMarblesByProgress();
      const leader = sorted.find((x) => !x.finished) || sorted[0];

      if (camMode === 0) {
        camera.position.lerp(
          new THREE.Vector3(start.x + 25, start.y + 55, start.z + 95),
          0.04
        );
        camera.lookAt(finishX * 0.2, finishY - 5, finishZ * 0.5);
      } else {
        const lp = leader.body.position;
        camera.position.lerp(new THREE.Vector3(lp.x - 8, lp.y + 10, lp.z + 14), 0.08);
        camera.lookAt(lp.x, lp.y + MARBLE_RADIUS, lp.z);
      }

      renderer.render(scene, camera);
    }

    function showRaceComplete() {
      const ordered = [...marbles].sort((a, b) => (a.place || 99) - (b.place || 99));
      finalListEl.innerHTML = ordered
        .map((m) => `${m.place}. ${m.name} — ${formatTime(m.finishTime)}`)
        .join('<br/>');
      overlayEl.classList.add('open');
    }

    window.addEventListener('keydown', (e) => {
      if (e.key === 'c' || e.key === 'C') {
        camMode = 1 - camMode;
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateLeaderboard();
    animate(lastT);
  })();
  </script>
</body>
</html>
